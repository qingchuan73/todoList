name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install React dependencies and build
        run: |
          cd examples/React
          npm install
          npm run build
          cd ../..

      - name: Install Vue dependencies and build
        run: |
          cd examples/Vue
          npm install
          npm run build
          cd ../..

      - name: Install Angular dependencies and build
        run: |
          cd examples/Angular
          npm install
          npm run build -- --base-href /todoList/
          cd ../..

      - name: Install Vanilla JS dependencies and build
        run: |
          cd examples/Vanilla JS
          npm install
          npm run build
          cd ../..

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4