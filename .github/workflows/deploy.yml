name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 创建统一的部署目录
      - name: Create deploy directory
        run: mkdir -p deploy

      - name: Build and copy React
        working-directory: examples/React
        run: |
          npm install
          npm run build
          cp -r dist ../../deploy/react

      - name: Build and copy Vue
        working-directory: examples/Vue
        run: |
          npm install
          npm run build
          cp -r dist ../../deploy/vue

      - name: Build and copy Angular
        working-directory: examples/Angular
        run: |
          npm install
          npm run build -- --base-href /todoList/
          cp -r dist ../../deploy/angular

      - name: Build and copy Vanilla JS
        working-directory: examples/Vanilla
        run: |
          npm install
          npm run build
          cp -r dist ../../deploy/vanilla

      # 复制根目录文件
      - name: Copy root files
        run: |
          cp index.html deploy/
          cp -r assets deploy/
          cp -r public deploy/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4